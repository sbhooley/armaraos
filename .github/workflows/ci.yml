name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Must match a version published on PyPI: https://pypi.org/project/ainativelang/
  # Keep aligned with marketing site latestAinlRelease (ainativelangweb config/site.ts).
  AINL_PYPI_VERSION: "1.7.0"

jobs:
  # ── Rust library crates (all 3 platforms) ──────────────────────────────────
  check:
    name: Check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.os }}
      - name: Vendor PostHog JS (pin from tooling/posthog-js.version)
        shell: bash
        run: bash scripts/vendor-posthog-js.sh
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo check --workspace

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: Vendor PostHog JS (pin from tooling/posthog-js.version)
        shell: bash
        run: bash scripts/vendor-posthog-js.sh
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      # Tests that need a display (Tauri) are skipped in headless CI via cfg
      - run: cargo test --workspace

  # Boots a real daemon with a temp ARMARAOS_HOME and runs scripts/verify-dashboard-smoke.sh.
  # Merge-gating — catches drift vs local ./scripts/verify-dashboard-smoke.sh.
  dashboard-smoke:
    name: Dashboard smoke (temp daemon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: dashboard-smoke
      - name: Vendor PostHog JS (pin from tooling/posthog-js.version)
        shell: bash
        run: bash scripts/vendor-posthog-js.sh
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build openfang CLI (release)
        run: cargo build --release -p openfang-cli
      - name: Run scripts/ci-dashboard-smoke.sh
        run: bash scripts/ci-dashboard-smoke.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Vendor PostHog JS (pin from tooling/posthog-js.version)
        shell: bash
        run: bash scripts/vendor-posthog-js.sh
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo clippy --workspace -- -D warnings

  desktop-ainl-resources:
    name: Desktop AINL bundle (wheel + portable Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-ainl-resources
      - name: Bundle wheel + Linux x86_64 portable Python
        run: |
          set -euo pipefail
          VENV="${RUNNER_TEMP}/ainl-bundle-venv"
          rm -rf "$VENV"
          python3 -m venv "$VENV"
          export PATH="$VENV/bin:$PATH"
          python -m pip install --upgrade pip
          cargo run -p xtask -- bundle-ainl-wheel --version "${AINL_PYPI_VERSION}"
          cargo run -p xtask -- bundle-portable-python --target x86_64-unknown-linux-gnu
      - name: Verify artifacts exist
        run: |
          test -n "$(find crates/openfang-desktop/resources/ainl -name 'ainativelang-*-py3-none-any.whl' 2>/dev/null | head -1)"
          test -f crates/openfang-desktop/resources/python/x86_64-unknown-linux-gnu/python/bin/python3

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Cargo / Tauri / README / api-reference samples
        run: bash scripts/check-version-consistency.sh

  memory-ga-gates:
    name: Memory GA gates (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: memory-ga-gates
      - name: Run memory GA gate validator (offline)
        run: bash scripts/check-memory-ga-gates.sh --offline

  openfang-kernel-programs:
    name: openfang-kernel + AINL programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: openfang-kernel-programs
      - name: Build and test openfang-kernel (build.rs embeds programs/)
        run: |
          cargo build -p openfang-kernel
          cargo test -p openfang-kernel
      - name: Validate programs/**/*.ainl (PyPI ainativelang)
        run: |
          set -euo pipefail
          python3 -m venv /tmp/ainl-ci
          /tmp/ainl-ci/bin/pip install -q "ainativelang==${AINL_PYPI_VERSION}"
          export PATH="/tmp/ainl-ci/bin:$PATH"
          find programs -name '*.ainl' -type f | while read -r f; do
            echo "validate $f"
            ainl validate "$f" --strict
          done

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  # ── Secrets scanning (prevent accidental credential commits) ──────────────
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock")

