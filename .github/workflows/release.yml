name: Release

# Tag push: normal releases. `workflow_dispatch`: re-run after a force-moved tag
# (GitHub often skips `push` workflows when `refs/tags/v*` is updated in place) or
# if a release job failed and the tag already exists.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.7.7)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  # Must match a version published on PyPI: https://pypi.org/project/ainativelang/
  # Bump after uploading a new wheel: cd AI_Native_Lang && python -m build && twine upload dist/*
  # Keep aligned with marketing site latestAinlRelease (ainativelangweb config/site.ts).
  AINL_PYPI_VERSION: "1.7.0"

jobs:
  # ── Tauri Desktop App (Windows + macOS + Linux) ───────────────────────────
  # Produces: .msi, .exe (Windows) | .dmg, .app (macOS) | .deb, .rpm, .AppImage (Linux)
  # Also generates and uploads latest.json (the auto-updater manifest)
  #
  # NOTE: AppImage is built via Tauri's `appimage` bundler, which downloads
  # `linuxdeploy-x86_64.AppImage` at build time. Historical flakiness was
  # mitigated by installing `libfuse2 + fuse3 + patchelf` (see "Install system
  # deps (Linux)" below). If a release fails specifically in the AppImage
  # bundle step, re-run via `workflow_dispatch` with the same tag — the deb
  # and rpm bundles already produced will be re-emitted alongside AppImage,
  # and the existing assets on the GitHub Release will be replaced.
  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            # Linux: ship deb + rpm + AppImage so users on Debian/Ubuntu, Fedora/RHEL/openSUSE, and AppImage-friendly distros all have a one-click installer.
            args: "--target x86_64-unknown-linux-gnu --bundles deb --bundles rpm --bundles appimage"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

          - name: Windows x86_64
            os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            os: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}

      - name: Vendor PostHog JS (pin from tooling/posthog-js.version)
        shell: bash
        run: bash scripts/vendor-posthog-js.sh

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            fuse3 \
            patchelf

      # Wrap the toolchain install in a retry: the `static.rust-lang.org`
      # download intermittently fails on the Windows ARM64 runner with a
      # tcp connect / EOF (most recent: v0.7.7 release), which cascades into
      # publish jobs being skipped. Three attempts with backoff is enough to
      # absorb the flake without changing toolchain pinning.
      # `shell: bash` is required so `&&` works on Windows runners (PowerShell
      # rejects `&&` as a statement separator pre-PS7).
      - name: Install Rust toolchain (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
            rustup target add ${{ matrix.platform.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}

      - name: Bundle AINL wheel into desktop resources
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then PY=python3; else PY=python; fi
          # Use an isolated venv so `pip` never hits PEP 668 (Homebrew Python on macOS runners).
          VENV="${RUNNER_TEMP:-/tmp}/ainl-bundle-venv"
          rm -rf "$VENV"
          "$PY" -m venv "$VENV"
          case "${RUNNER_OS}" in
            Windows)
              export PATH="$VENV/Scripts:$PATH"
              ;;
            *)
              export PATH="$VENV/bin:$PATH"
              ;;
          esac
          python -m pip install --upgrade pip
          cargo run -p xtask -- bundle-ainl-wheel --version "${AINL_PYPI_VERSION}"

      - name: Bundle portable Python (AINL venv without system Python)
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p xtask -- bundle-portable-python --target "${{ matrix.platform.rust_target }}"

      - name: Import macOS signing certificate
        # Required secrets (add under repo Settings → Secrets → Actions):
        #   MAC_CERT_BASE64       — base64-encoded Developer ID Application .p12 cert
        #                           base64 -i cert.p12 | pbcopy
        #   MAC_CERT_PASSWORD     — password set when exporting the .p12 from Keychain
        #
        # Without these, builds use ad-hoc signing (-) which is NOT notarizable and
        # triggers the "unidentified developer" warning on macOS.
        if: runner.os == 'macOS'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MAC_CERT_BASE64:-}" ]; then
            echo "::warning::MAC_CERT_BASE64 not set — using ad-hoc codesign identity (-)."
            echo "::warning::This build will NOT be notarized. Users on macOS will see 'unidentified developer'."
            echo "::warning::To fix: export a Developer ID Application cert as .p12, base64-encode it,"
            echo "::warning::and add MAC_CERT_BASE64 + MAC_CERT_PASSWORD to GitHub repo secrets."
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "NOTARIZE_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "$MAC_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Certificate imported but no 'Developer ID Application' identity found."
            echo "::error::Ensure MAC_CERT_BASE64 is a Developer ID Application certificate, not Distribution."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "NOTARIZE_READY=true" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Configure macOS notarization
        # Required secrets (in addition to MAC_CERT_BASE64):
        #   MAC_NOTARIZE_APPLE_ID  — Apple ID email (e.g. dev@example.com)
        #   MAC_NOTARIZE_PASSWORD  — App-specific password (appleid.apple.com → Security)
        #   MAC_NOTARIZE_TEAM_ID   — 10-char Team ID (developer.apple.com → Membership)
        #
        # All three must be set for notarization to run. Without notarization, macOS
        # Gatekeeper quarantines the .dmg on first launch.
        if: runner.os == 'macOS'
        env:
          APPLE_ID_SECRET: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ "${NOTARIZE_READY:-false}" != "true" ]; then
            echo "Skipping notarization: no Developer ID certificate."
            exit 0
          fi
          if [ -z "${APPLE_ID_SECRET:-}" ] || [ -z "${APPLE_PASSWORD_SECRET:-}" ] || [ -z "${APPLE_TEAM_ID_SECRET:-}" ]; then
            echo "::warning::Notarization secrets missing (MAC_NOTARIZE_APPLE_ID / MAC_NOTARIZE_PASSWORD / MAC_NOTARIZE_TEAM_ID)."
            echo "::warning::Build will be signed but not notarized — Gatekeeper quarantine applies on first run."
            exit 0
          fi
          echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
          echo "Notarization configured for ${APPLE_ID_SECRET}"

      - name: Build and bundle Tauri desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          # Baked into the binary (option_env!) — same PostHog project as ainativelang.com when set.
          # Prefer ARMARAOS_*; fallback AINL_* so one org-level secret matches the ecosystem (same phc_ as NEXT_PUBLIC_POSTHOG_KEY on ainativelangweb).
          # Embedded dashboard (`openfang-api` / webchat.rs) reads ARMARAOS_DASHBOARD_POSTHOG_KEY first, then POSTHOG_KEY / AINL_* — duplicate here so one CI secret wires both desktop + daemon UI analytics.
          ARMARAOS_POSTHOG_KEY: ${{ secrets.ARMARAOS_POSTHOG_KEY || secrets.AINL_POSTHOG_KEY }}
          ARMARAOS_DASHBOARD_POSTHOG_KEY: ${{ secrets.ARMARAOS_POSTHOG_KEY || secrets.AINL_POSTHOG_KEY }}
          ARMARAOS_POSTHOG_HOST: ${{ secrets.ARMARAOS_POSTHOG_HOST || secrets.AINL_POSTHOG_HOST }}
          AINL_POSTHOG_KEY: ${{ secrets.ARMARAOS_POSTHOG_KEY || secrets.AINL_POSTHOG_KEY }}
          AINL_POSTHOG_HOST: ${{ secrets.ARMARAOS_POSTHOG_HOST || secrets.AINL_POSTHOG_HOST }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "ArmaraOS ${{ env.RELEASE_TAG }}"
          releaseBody: |
            ## What's New

            See the [CHANGELOG](https://github.com/sbhooley/armaraos/blob/main/CHANGELOG.md) for full details.

            ## Installation

            **Desktop App** — Download the installer for your platform below.

            **CLI (Linux/macOS)**:
            ```bash
            curl -sSf https://armaraos.sh | sh
            # or: curl -fsSL https://raw.githubusercontent.com/sbhooley/armaraos/main/scripts/install.sh | bash
            ```

            **Docker**:
            ```bash
            docker pull ghcr.io/sbhooley/armaraos:latest
            ```

            **Coming from OpenClaw?**
            ```bash
            armaraos migrate --from openclaw
            ```
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          # Prefer NSIS Setup.exe over WiX .msi when both exist (matches shipped assets).
          updaterJsonPreferNsis: true
          projectPath: crates/openfang-desktop
          args: ${{ matrix.platform.args }}

  # Post-process: tauri-action skips latest.json when it finds no .sig artifacts on the runner.
  # This job downloads published bundles from the release, signs them with TAURI_SIGNING_PRIVATE_KEY,
  # and uploads a combined latest.json so the website sync step can mirror installers.
  publish-updater-latest-json:
    name: Publish latest.json (signed)
    needs: [desktop]
    # Run even when the desktop matrix has a partial failure (e.g. flaky
    # Windows ARM64 toolchain install). `assemble-latest-json.sh` skips any
    # missing platform with a warning, so the latest.json we ship reflects
    # whatever bundles actually made it onto the release. Only skip if the
    # workflow itself was cancelled or the trigger isn't a tag/dispatch.
    if: ${{ always() && needs.desktop.result != 'cancelled' && (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v') || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}

      - name: Install Rust toolchain (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Assemble latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/ci/assemble-latest-json.sh

  # ── Mirror Tauri updater to public website (ainativelang.com) ───────────────
  # Rewrites latest.json URLs from GitHub release assets to /downloads/armaraos/
  # Requires secret: AINLATIVELANGWEB_DEPLOY_TOKEN (fine-grained PAT, contents:write on ainativelangweb).
  sync-desktop-updates-to-website:
    name: Publish updater to ainativelang.com
    # This job mirrors *downloadable installers* to ainativelang.com. It prefers a signed
    # updater `latest.json` when present on the GitHub Release, but does NOT require
    # TAURI_SIGNING_PRIVATE_KEY — so we can still keep the website download buttons fresh
    # even if updater signing is temporarily unavailable.
    needs: [desktop]
    # Run even when one platform of the desktop matrix failed (e.g. Windows
    # ARM64 toolchain flake). The downstream rewrite step conditionally adds
    # only the platforms whose installers actually shipped, and our signed
    # `latest.json` step warns rather than errors on missing platforms.
    if: ${{ always() && needs.desktop.result != 'cancelled' && (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v') || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check deploy token
        env:
          TOK: ${{ secrets.AINLATIVELANGWEB_DEPLOY_TOKEN }}
        run: |
          if [ -z "${TOK}" ]; then
            echo "::error::Missing secret AINLATIVELANGWEB_DEPLOY_TOKEN — add a fine-grained PAT with contents:write on sbhooley/ainativelangweb. See docs/release-desktop.md."
            exit 1
          fi

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect prerelease tag (semver pre-release segment)
        id: tagkind
        run: |
          set -euo pipefail
          T="${RELEASE_TAG#v}"
          if [[ "$T" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${RELEASE_TAG} is a prerelease (beta channel only; stable latest.json unchanged on the website)."
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${RELEASE_TAG} is stable (latest.json + beta.json on the website)."
          fi

      - name: Fetch release metadata (asset list + published_at)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/armaraos-release
          gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" > /tmp/armaraos-release/release.json
          test -s /tmp/armaraos-release/release.json

      - name: Download installers (desktop artifacts) from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # We mirror end-user desktop installers (used by website download buttons),
          # plus updater bundles if present.
          mapfile -t FILES < <(jq -r '
            [.assets[].name
              | select(
                  (test("^ArmaraOS_.*\\.(dmg|deb|rpm)$"))
                  or (test("^ArmaraOS_.*_(x64|arm64)-setup\\.exe$"))
                  or (test("^ArmaraOS_.*_(x64|arm64)_en-US\\.msi$"))
                  or (test("^ArmaraOS_(aarch64|x64)\\.app\\.tar\\.gz$"))
                )
            ] | unique[]' /tmp/armaraos-release/release.json)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No ArmaraOS desktop installer assets found on release ${RELEASE_TAG}."
            echo "::error::Expected assets like ArmaraOS_<ver>_x64-setup.exe / .dmg / .deb."
            exit 1
          fi

          args=()
          for f in "${FILES[@]}"; do
            args+=(-p "$f")
          done

          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/armaraos-release \
            "${args[@]}"

      - name: Download signed updater latest.json if present (optional)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # If the release already has a signed latest.json (tauri-action or post-process),
          # prefer it. Otherwise, we'll generate a lightweight website-only latest.json.
          if jq -e '.assets[].name | select(. == "latest.json")' /tmp/armaraos-release/release.json >/dev/null; then
            gh release download "${RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --dir /tmp/armaraos-release \
              -p "latest.json"
            echo "Downloaded signed latest.json from release."
          else
            echo "No latest.json asset on release; will generate website download manifest."
          fi

      - name: Rewrite updater JSON and stage binaries
        env:
          PRERELEASE: ${{ steps.tagkind.outputs.prerelease }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/updater-web
          BASE="https://ainativelang.com/downloads/armaraos"

          PUB_DATE="$(jq -r '.published_at // empty' /tmp/armaraos-release/release.json)"
          VERSION="${RELEASE_TAG#v}"

          # Stage mirrored binaries.
          for f in /tmp/armaraos-release/*; do
            base=$(basename "$f")
            case "$base" in
              release.json) continue ;;
              latest.json) continue ;;
            esac
            cp -v "$f" "/tmp/updater-web/$base"
          done

          if [ -f /tmp/armaraos-release/latest.json ]; then
            # Signed updater manifest path: rewrite embedded URLs to website mirror.
            jq_rewrite='def fname: split("/") | last | split("?") | .[0];
              walk(
                if type == "object" and has("url") then
                  .url = ($base + "/" + (.url | fname))
                else . end
              )'
            if [ "${PRERELEASE}" = "true" ]; then
              jq --arg base "$BASE" "$jq_rewrite" /tmp/armaraos-release/latest.json > /tmp/updater-web/beta.json
              echo "Staged beta.json only (prerelease; signed updater manifest)."
            else
              jq --arg base "$BASE" "$jq_rewrite" /tmp/armaraos-release/latest.json > /tmp/updater-web/latest.json
              cp -v /tmp/updater-web/latest.json /tmp/updater-web/beta.json
              echo "Staged latest.json + beta.json (signed updater manifest)."
            fi
          else
            # Website-only manifest: enough for download buttons (NOT for in-app updater installs).
            #
            # Keep format compatible with ainativelangweb’s loader (`fromUpdaterManifest` reads `.platforms[*].url`).
            # We intentionally omit `signature` fields here.
            url_for() {
              local pat="$1"
              jq -r --arg p "$pat" '.assets[] | select(.name | test($p)) | .name' /tmp/armaraos-release/release.json | head -1
            }

            DMG_AARCH="$(url_for '^ArmaraOS_.*_aarch64\\.dmg$')"
            DMG_X64="$(url_for '^ArmaraOS_.*_x64\\.dmg$')"
            WIN_X64_EXE="$(url_for '^ArmaraOS_.*_x64-setup\\.exe$')"
            WIN_ARM_EXE="$(url_for '^ArmaraOS_.*_arm64-setup\\.exe$')"
            LINUX_DEB="$(url_for '^ArmaraOS_.*_amd64\\.deb$')"

            jq -n \
              --arg v "$VERSION" \
              --arg notes "ArmaraOS ${RELEASE_TAG} — see https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}" \
              --arg pub "$PUB_DATE" \
              --arg base "$BASE" \
              --arg dmg_aarch "$DMG_AARCH" \
              --arg dmg_x64 "$DMG_X64" \
              --arg win_x64 "$WIN_X64_EXE" \
              --arg win_arm "$WIN_ARM_EXE" \
              --arg linux_deb "$LINUX_DEB" \
              '{
                version: $v,
                notes: $notes,
                pub_date: $pub,
                platforms: (
                  {}
                  + (if ($dmg_aarch | length) > 0 then {"darwin-aarch64": {url: ($base + "/" + $dmg_aarch)}} else {} end)
                  + (if ($dmg_x64 | length) > 0 then {"darwin-x86_64": {url: ($base + "/" + $dmg_x64)}} else {} end)
                  + (if ($win_x64 | length) > 0 then {"windows-x86_64": {url: ($base + "/" + $win_x64)}} else {} end)
                  + (if ($win_arm | length) > 0 then {"windows-aarch64": {url: ($base + "/" + $win_arm)}} else {} end)
                  + (if ($linux_deb | length) > 0 then {"linux-x86_64": {url: ($base + "/" + $linux_deb)}} else {} end)
                )
              }' > /tmp/updater-web/latest.json

            if [ "${PRERELEASE}" = "true" ]; then
              # Beta-only: keep stable latest.json on site, but still update beta.json and installers.
              cp -v /tmp/updater-web/latest.json /tmp/updater-web/beta.json
              rm -f /tmp/updater-web/latest.json
              echo "Staged beta.json only (prerelease; website-only manifest)."
            else
              cp -v /tmp/updater-web/latest.json /tmp/updater-web/beta.json
              echo "Staged latest.json + beta.json (website-only manifest)."
            fi
          fi

      - uses: actions/checkout@v6
        with:
          repository: sbhooley/ainativelangweb
          token: ${{ secrets.AINLATIVELANGWEB_DEPLOY_TOKEN }}
          path: web

      - name: Copy into public/downloads/armaraos (keep README.md)
        env:
          PRERELEASE: ${{ steps.tagkind.outputs.prerelease }}
        run: |
          set -euo pipefail
          DEST="web/public/downloads/armaraos"
          mkdir -p "$DEST"
          if [ "${PRERELEASE}" = "true" ]; then
            echo "Prerelease: merge beta.json + new binaries into $DEST (do not delete stable latest.json)."
            cp -v /tmp/updater-web/beta.json "$DEST/beta.json"
            for src in /tmp/updater-web/*; do
              [ -e "$src" ] || continue
              base=$(basename "$src")
              if [ "$base" = "latest.json" ]; then
                continue
              fi
              cp -v "$src" "$DEST/$base"
            done
          else
            find "$DEST" -mindepth 1 -maxdepth 1 ! -name 'README.md' -exec rm -rf {} +
            cp -v /tmp/updater-web/* "$DEST/"
          fi

      - name: Bump latestArmaraosReleaseTag in config/site.ts
        env:
          PRERELEASE: ${{ steps.tagkind.outputs.prerelease }}
        run: |
          set -euo pipefail
          # Only bump the stable tag; prerelease tags don't change the homepage version badge.
          if [ "${PRERELEASE}" = "true" ]; then
            echo "Prerelease — skipping config/site.ts bump."
            exit 0
          fi
          SITE_TS="web/config/site.ts"
          if [ ! -f "$SITE_TS" ]; then
            echo "::warning::$SITE_TS not found; skipping version bump."
            exit 0
          fi
          # Replace the latestArmaraosReleaseTag value in-place.
          sed -i "s|latestArmaraosReleaseTag: \"v[^\"]*\"|latestArmaraosReleaseTag: \"${RELEASE_TAG}\"|g" "$SITE_TS"
          echo "Set latestArmaraosReleaseTag to ${RELEASE_TAG} in $SITE_TS"

      - name: Commit and push
        run: |
          set -euo pipefail
          cd web
          git config user.name "ArmaraOS release"
          git config user.email "armaraos-releases@users.noreply.github.com"
          git add public/downloads/armaraos/ config/site.ts
          if git diff --staged --quiet; then
            echo "No file changes; skipping push."
            exit 0
          fi
          git commit -m "chore: ArmaraOS desktop updater ${{ env.RELEASE_TAG }}"
          git push origin HEAD:main

      - name: Ping ainativelangweb sync workflow
        # Fire a repository_dispatch to ainativelangweb so its sync-armaraos-release
        # workflow knows a new release landed (used as a fallback trigger if the
        # direct commit above was skipped due to a missing deploy token).
        env:
          TOK: ${{ secrets.AINLATIVELANGWEB_DEPLOY_TOKEN }}
        run: |
          if [ -z "${TOK}" ]; then
            echo "No deploy token — skipping repository_dispatch ping."
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOK}" \
            https://api.github.com/repos/sbhooley/ainativelangweb/dispatches \
            -d "{\"event_type\":\"armaraos-released\",\"client_payload\":{\"tag\":\"${RELEASE_TAG}\"}}"

  # ── CLI Binary (5 platforms) ──────────────────────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}

      - name: Install Rust toolchain (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
            rustup target add ${{ matrix.target }}
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} --bin openfang
      - name: Build CLI
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --bin openfang
      - name: Ad-hoc codesign CLI binary (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr target/${{ matrix.target }}/release/openfang || true
          codesign --force --sign - target/${{ matrix.target }}/release/openfang
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../openfang-${{ matrix.target }}.tar.gz openfang
          cd ../../..
          sha256sum openfang-${{ matrix.target }}.tar.gz > openfang-${{ matrix.target }}.tar.gz.sha256
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openfang.exe" -DestinationPath "openfang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "openfang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  openfang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "openfang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: openfang-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (linux/amd64 + linux/arm64) ────────────────────────────────────
  # Off by default: multi-arch push is slow and the image targets server/web-style
  # deployments, not the desktop app. To publish on a tag, set the repo variable
  # ENABLE_ARMARAOS_DOCKER_RELEASE to "true" (Settings → Secrets and variables → Actions → Variables).
  docker:
    name: Docker Image
    if: ${{ vars.ENABLE_ARMARAOS_DOCKER_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/armaraos:latest
            ghcr.io/${{ github.repository_owner }}/armaraos:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
