[[permission]]
identifier = "allow-dashboard-ui-prefs"
description = "Allows the embedded dashboard to persist theme mode and bookmarks across restarts (random localhost port breaks localStorage)."
commands.allow = [
  "set_dashboard_theme_mode",
  "get_dashboard_bookmarks",
  "set_dashboard_bookmarks",
  "open_external_url",
  "open_premium_ainl_verify_browser",
  "open_ainl_library_dir",
  "check_for_updates",
  "install_update",
  "get_desktop_updater_prefs",
  "set_release_channel",
  "report_daemon_update_check",
  "generate_support_bundle",
  "copy_diagnostics_to_downloads",
  "copy_home_file_to_downloads",
  "compose_support_email",
  "get_desktop_product_analytics_prefs",
  "set_desktop_product_analytics_prefs",
]
